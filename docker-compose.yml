services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openbeats
      POSTGRES_PASSWORD: openbeats
      POSTGRES_DB: openbeats
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbeats"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8090"
      DATABASE_URL: "postgres://openbeats:openbeats@postgres:5432/openbeats?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      JWT_TTL: "24h"
      STORAGE_PATH: "/data"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      CORS_ORIGINS: "*"
    volumes:
      - audio:/data
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api
    # The UI is served here; nginx proxies /api and /healthz to the api service.
    ports:
      - "3000:80"

volumes:
  pgdata:
  audio:
