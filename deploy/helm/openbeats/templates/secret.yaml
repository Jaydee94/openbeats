apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openbeats.fullname" . }}-secret
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{/* Generate a random JWT secret on first install if none provided. */}}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default (randAlphaNum 48) | quote }}
  ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  DATABASE_URL: {{ include "openbeats.databaseUrl" . | quote }}
{{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | quote }}
{{- end }}
