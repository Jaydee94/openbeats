{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openbeats.fullname" . }}
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # All traffic goes to the web service; nginx proxies /api internally.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openbeats.webName" . }}
                port:
                  number: {{ .Values.web.port }}
{{- end }}
