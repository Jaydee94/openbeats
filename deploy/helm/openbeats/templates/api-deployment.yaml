apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openbeats.apiName" . }}
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "openbeats.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "openbeats.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "openbeats.fullname" . }}-config
            - secretRef:
                name: {{ include "openbeats.fullname" . }}-secret
          volumeMounts:
            - name: audio
              mountPath: {{ .Values.storage.mountPath }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: audio
          persistentVolumeClaim:
            claimName: {{ include "openbeats.fullname" . }}-audio
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openbeats.apiName" . }}
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
