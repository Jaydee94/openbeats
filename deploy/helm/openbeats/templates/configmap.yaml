apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openbeats.fullname" . }}-config
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.api.port | quote }}
  STORAGE_PATH: {{ .Values.storage.mountPath | quote }}
  JWT_TTL: {{ .Values.api.jwtTTL | quote }}
  CORS_ORIGINS: {{ .Values.api.corsOrigins | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openbeats.webName" . }}-nginx
  labels:
    {{- include "openbeats.labels" . | nindent 4 }}
data:
  default.conf: |
    upstream openbeats_api {
        server {{ include "openbeats.apiName" . }}:{{ .Values.api.port }};
    }
    server {
        listen {{ .Values.web.port }};
        server_name _;
        client_max_body_size 512m;
        root /usr/share/nginx/html;
        index index.html;
        location /api/ {
            proxy_pass http://openbeats_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
        location /healthz {
            proxy_pass http://openbeats_api;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
