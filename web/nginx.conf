# nginx serves the built SPA and reverse-proxies API + health to the backend.
# The upstream host is the "api" service (compose) or the API Service DNS name
# (Kubernetes). Override with the API_HOST/API_PORT build-time substitution if
# needed; defaults target the docker-compose service name.
upstream openbeats_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    # Allow large audio uploads through the proxy.
    client_max_body_size 512m;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://openbeats_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream audio without buffering so Range requests pass through.
        proxy_buffering off;
    }

    location /healthz {
        proxy_pass http://openbeats_api;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
